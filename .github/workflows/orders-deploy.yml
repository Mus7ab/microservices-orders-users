name: Orders Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "services/orders/**"
      - "terraform/ecs-task-definitions.tf"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push orders image
        working-directory: services/orders
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/orders-service:${{ github.sha }} .
          docker push ${{ steps.ecr-login.outputs.registry }}/orders-service:${{ github.sha }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition microservices-orders \
            --region ap-south-2 \
            --query 'taskDefinition' \
            --output json > task-def.json

      - name: Update image in task definition
        id: update-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: orders
          image: ${{ steps.ecr-login.outputs.registry }}/orders-service:${{ github.sha }}

      - name: Deploy updated task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.update-task-def.outputs.task-definition }}
          service: microservices-orders-service
          cluster: microservices-cluster
          wait-for-service-stability: true
