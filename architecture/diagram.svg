<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#0f1115"/>

  <text x="600" y="40" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Containerized Microservices Platform — ECS Fargate</text>

  <!-- Internet -->
  <text x="600" y="85" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Internet</text>
  <line x1="600" y1="95" x2="600" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ALB -->
  <rect x="440" y="145" width="320" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Application Load Balancer</text>
  <text x="600" y="196" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="12">SG: 80 from 0.0.0.0/0 | public subnets</text>

  <line x1="600" y1="215" x2="600" y2="245" stroke="#6b7280" stroke-width="2"/>
  <line x1="600" y1="245" x2="360" y2="245" stroke="#6b7280" stroke-width="2"/>
  <line x1="600" y1="245" x2="840" y2="245" stroke="#6b7280" stroke-width="2"/>
  <line x1="360" y1="245" x2="360" y2="280" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="840" y1="245" x2="840" y2="280" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="360" y="270" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="bold">/orders/* rule</text>
  <text x="840" y="270" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="bold">/users/* rule</text>

  <!-- Target Groups -->
  <rect x="230" y="285" width="260" height="60" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="310" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">orders-tg</text>
  <text x="360" y="328" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="11">target_type = ip | /health check</text>

  <rect x="710" y="285" width="260" height="60" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="2"/>
  <text x="840" y="310" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">users-tg</text>
  <text x="840" y="328" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="11">target_type = ip | /health check</text>

  <line x1="360" y1="345" x2="360" y2="380" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="840" y1="345" x2="840" y2="380" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ECS Services -->
  <rect x="220" y="385" width="280" height="60" rx="8" fill="#2e1a3a" stroke="#a855f7" stroke-width="2"/>
  <text x="360" y="410" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">ECS Service: orders</text>
  <text x="360" y="428" text-anchor="middle" fill="#d8b4fe" font-family="Arial, sans-serif" font-size="11">desired_count = 2</text>

  <rect x="700" y="385" width="280" height="60" rx="8" fill="#2e1a3a" stroke="#a855f7" stroke-width="2"/>
  <text x="840" y="410" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">ECS Service: users</text>
  <text x="840" y="428" text-anchor="middle" fill="#d8b4fe" font-family="Arial, sans-serif" font-size="11">desired_count = 2</text>

  <line x1="360" y1="445" x2="360" y2="480" stroke="#6b7280" stroke-width="2"/>
  <line x1="840" y1="445" x2="840" y2="480" stroke="#6b7280" stroke-width="2"/>
  <line x1="290" y1="480" x2="430" y2="480" stroke="#6b7280" stroke-width="2"/>
  <line x1="770" y1="480" x2="910" y2="480" stroke="#6b7280" stroke-width="2"/>
  <line x1="290" y1="480" x2="290" y2="510" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="480" x2="430" y2="510" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="770" y1="480" x2="770" y2="510" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="910" y1="480" x2="910" y2="510" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fargate Tasks -->
  <rect x="200" y="515" width="180" height="80" rx="8" fill="#1e2a3a" stroke="#60a5fa" stroke-width="2"/>
  <text x="290" y="540" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="12" font-weight="bold">orders task</text>
  <text x="290" y="558" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">AZ-a | public subnet</text>
  <text x="290" y="574" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">own ENI, port 3000</text>

  <rect x="340" y="515" width="180" height="80" rx="8" fill="#1e2a3a" stroke="#60a5fa" stroke-width="2"/>
  <text x="430" y="540" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="12" font-weight="bold">orders task</text>
  <text x="430" y="558" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">AZ-b | public subnet</text>
  <text x="430" y="574" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">own ENI, port 3000</text>

  <rect x="680" y="515" width="180" height="80" rx="8" fill="#1e2a3a" stroke="#60a5fa" stroke-width="2"/>
  <text x="770" y="540" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="12" font-weight="bold">users task</text>
  <text x="770" y="558" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">AZ-a | public subnet</text>
  <text x="770" y="574" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">own ENI, port 3000</text>

  <rect x="820" y="515" width="180" height="80" rx="8" fill="#1e2a3a" stroke="#60a5fa" stroke-width="2"/>
  <text x="910" y="540" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="12" font-weight="bold">users task</text>
  <text x="910" y="558" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">AZ-b | public subnet</text>
  <text x="910" y="574" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">own ENI, port 3000</text>

  <!-- Legend / notes -->
  <rect x="100" y="640" width="1000" height="200" rx="8" fill="#161a20" stroke="#374151" stroke-width="1"/>
  <text x="120" y="670" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Security &amp; Deployment Notes</text>
  <text x="120" y="700" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">• ecs-tasks-sg: inbound port 3000 only from alb-sg (chained least-privilege, same pattern as Project 1)</text>
  <text x="120" y="722" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">• Tasks run in public subnets with assign_public_ip = true — required to reach ECR (public endpoint) without a NAT Gateway</text>
  <text x="120" y="744" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">• Unmatched paths (e.g. /dashboard) receive a 404 fixed-response directly from the ALB listener's default_action</text>
  <text x="120" y="766" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">• Each service has its own GitHub Actions pipeline: build → tag with commit SHA → push to ECR → render new task</text>
  <text x="140" y="786" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">definition revision → deploy — independently, per service</text>
  <text x="120" y="810" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">• Remote state (S3 + native locking) configured before any CI/CD pipeline existed</text>

  <text x="600" y="875" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">github.com/Mus7ab/microservices-orders-users</text>
</svg>
